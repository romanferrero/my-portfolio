<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Roman Ferrero - Portfolio personal. Estudiante avanzado de Ingenieria en Sistemas (ORT Uruguay) y desarrollador full-stack." />
    <meta name="author" content="Roman Ferrero" />
    <meta name="theme-color" content="#0f172a" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Roman Ferrero - Portfolio" />
    <meta property="og:description" content="Estudiante avanzado de Ingenieria en Sistemas (ORT Uruguay) y desarrollador full-stack." />

    <!-- Fonts: Inter (sans) + JetBrains Mono (mono) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!--
      Anti-flash theme bootstrap. Runs synchronously before React mounts so
      the first paint already has the correct .dark class.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var theme = stored === "light" || stored === "dark" ? stored : (prefersDark ? "dark" : "light");
          if (theme === "dark") document.documentElement.classList.add("dark");
        } catch (_) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>

    <title>Roman Ferrero - Portfolio</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
