<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="generator" content="Vite + React" />

    <!-- Primary -->

    />
    <meta name="author" content="Roman Ferrero" />
    <meta name="theme-color" content="#7c3aed" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0a0a0f" media="(prefers-color-scheme: dark)" />
    <meta name="robots" content="index, follow" />

    <!-- Canonical (replace with your real domain after deploy) -->

    <!-- Open Graph (LinkedIn / WhatsApp / Slack / Facebook) -->

    <meta property="og:site_name" content="Roman Ferrero" />
    <meta property="og:url" content="https://roman-ferrero.vercel.app/" />
    <meta property="og:title" content="Roman Ferrero - Full-Stack Developer" />
    <meta
      property="og:description"
      content="Advanced Computer Engineering student at Universidad ORT Uruguay. Full-stack developer working with React, Node.js, .NET, Java and SQL."
    />
    <meta property="og:image" content="https://roman-ferrero.vercel.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Roman Ferrero - Full-Stack Developer Portfolio" />
    <meta property="og:locale" content="es_UY" />
    <meta property="og:locale:alternate" content="en_US" />
    <meta property="profile:first_name" content="Roman" />
    <meta property="profile:last_name" content="Ferrero" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Roman Ferrero - Full-Stack Developer" />

      name="twitter:description"
      content="Portfolio of Roman Ferrero, advanced Computer Engineering student and full-stack developer."
    />
    <meta name="twitter:image" content="https://roman-ferrero.vercel.app/og-image.png" />

    <!-- Fonts: Inter (sans) + JetBrains Mono (mono) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Structured data: Person schema for Google Knowledge Graph -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Roman Ferrero",
        "url": "https://roman-ferrero.vercel.app/",
        "image": "https://roman-ferrero.vercel.app/og-image.png",
        "jobTitle": "Full-Stack Developer",
        "description": "Advanced Computer Engineering student at Universidad ORT Uruguay and full-stack developer.",
        "email": "mailto:romaferrero@hotmail.com",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Montevideo",
          "addressCountry": "UY"
        },
        "alumniOf": {
          "@type": "CollegeOrUniversity",
          "name": "Universidad ORT Uruguay"
        },
        "sameAs": [
          "https://www.linkedin.com/in/romanferrero",
          "https://github.com/romanferrero"
        ],
        "knowsAbout": [
          "JavaScript",
          "TypeScript",
          "React",
          "Node.js",
          ".NET",
          "Java",
          "C#",
          "SQL",
          "REST APIs",
          "Full-Stack Development"
        ],
        "knowsLanguage": ["es", "en", "pt"]
      }
    </script>

    <!--
      Anti-flash theme bootstrap. Runs synchronously before React mounts so
      the first paint already has the correct .dark class.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var theme = stored === "light" || stored === "dark" ? stored : (prefersDark ? "dark" : "light");
          if (theme === "dark") document.documentElement.classList.add("dark");
        } catch (_) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
